# System-wide tmux defaults for the claude-dev pod. Baked to /etc/tmux.conf
# (NOT ~/.tmux.conf) because the /home/claude PVC mounts over $HOME and would
# shadow a home-dir config. tmux reads /etc/tmux.conf first, so this applies to
# every session; a user ~/.tmux.conf on the PVC can still override it.
#
# Fixes washed-out colors: tmux otherwise defaults default-terminal to "screen"
# (8 colors), clamping Claude Code's 256-color/truecolor output. tmux-256color
# terminfo is provided by the ncurses-term package (installed in the Dockerfile).
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:RGB"

# Let modern TUIs pass escape sequences through tmux (graphics, OSC, etc.).
set -g allow-passthrough on
