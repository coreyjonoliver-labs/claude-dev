name: build
on:
  push:
    branches: [main]
    paths: ["Dockerfile", "tmux.conf", ".github/workflows/build.yml"]
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ghcr.io/coreyjonoliver-labs/claude-dev:0.1.0
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/coreyjonoliver-labs/claude-dev   # tag-less
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - run: echo "pushed ghcr.io/coreyjonoliver-labs/claude-dev:0.1.0@${{ steps.build.outputs.digest }}"